name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: Foundry Engagement Kit ${{ github.ref_name }}
          releaseBody: |
            Desktop installers for **macOS** (Apple Silicon + Intel), **Windows**, and **Linux**.

            Download the asset for your platform, install, then point the app at your workspace folder in **Settings** (must contain `daily/`, `weekly/`, `project/`, `reference/`).

            | Platform | Artifact |
            |----------|----------|
            | macOS | `.dmg` |
            | Windows | `.msi` or `-setup.exe` |
            | Linux | `.deb`, `.AppImage`, or `.rpm` |

            See [app/README.md](https://github.com/${{ github.repository }}/blob/main/app/README.md) for build-from-source instructions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
