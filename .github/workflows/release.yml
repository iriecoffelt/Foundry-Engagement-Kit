name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    env:
      # Reduce flaky crates.io downloads in CI (SSL_ERROR_SYSCALL, etc.)
      CARGO_NET_RETRY: 10
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Add Rust target (macOS)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Stage workspace seed
        working-directory: app
        run: node scripts/stage-workspace-seed.mjs

      - name: Prefetch Rust dependencies
        working-directory: app/src-tauri
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            cargo fetch && exit 0
            echo "cargo fetch attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          exit 1

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: Foundry Engagement Kit ${{ github.ref_name }}
          releaseBody: |
            Desktop installers for **macOS** (Apple Silicon + Intel), **Windows**, and **Linux**.

            **First launch:** the app prompts you to choose where your workspace should live and creates all required folders automatically (`daily/`, `weekly/`, `project/`, `reference/`, `project/_template/`).

            | Platform | Artifact |
            |----------|----------|
            | macOS (Apple Silicon) | `*_aarch64.dmg` |
            | macOS (Intel) | `*_x64.dmg` |
            | Windows | `.msi` or `-setup.exe` |
            | Linux | `.deb`, `.AppImage`, or `.rpm` |

            See [app/README.md](https://github.com/${{ github.repository }}/blob/main/app/README.md) for build-from-source instructions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
